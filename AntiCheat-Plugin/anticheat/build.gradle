plugins {
    id 'java'
}

group = 'dev.anticheat'
version = '1.0.0'
description = 'AntiCheat Plugin for Bukkit 1.21.1'

// Java 25 is not yet released; using Java 21 (LTS) which is the highest
// stable version supported by Bukkit/Spigot toolchains.
// Swap to 25 once it ships and your JDK supports it.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven {
        name = 'spigot-repo'
        url = 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/'
    }
    maven {
        name = 'sonatype'
        url = 'https://oss.sonatype.org/content/groups/public/'
    }
}

dependencies {
    compileOnly 'org.spigotmc:spigot-api:1.21.1-R0.1-SNAPSHOT'
}

processResources {
    def props = [version: version]
    inputs.properties props
    filteringCharset 'UTF-8'
    filesMatching('plugin.yml') {
        expand props
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    archiveFileName = 'AntiCheat-' + version + '.jar'
}
