name: AntiCheat
version: '1.0.0'
main: dev.anticheat.AntiCheatPlugin
api-version: '1.21'
description: Lightweight anti-cheat for Bukkit 1.21.1
authors: [AntiCheatDev]
commands:
  anticheat:
    description: AntiCheat admin commands
    usage: /anticheat <reload|status|whitelist <add|remove> <player>>
    permission: anticheat.admin
permissions:
  anticheat.admin:
    description: Full access to AntiCheat commands
    default: op
  anticheat.bypass:
    description: Bypass all AntiCheat checks
    default: false
